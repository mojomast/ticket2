services:
  db:
    ports:
      - "5433:5432"
    networks:
      - db-only
      - web

  app:
    build:
      context: ./backend
      target: build
    read_only: false
    command: npm run dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backup-data:/app/data/backups
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

volumes:
  postgres_data:
  backup-data:
